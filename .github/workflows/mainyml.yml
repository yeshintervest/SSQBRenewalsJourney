name: Weekly journey screenshots

on:
  schedule:
    - cron: "0 6 * * 3"   # 06:00 UTC every Wednesday
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: screenshots
  cancel-in-progress: false

jobs:
  capture:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          python -m playwright install --with-deps chromium

      # --- Quote & Buy journeys (one per variant) ---
      - name: Capture quote - annual 1 traveller, no medical
        continue-on-error: true
        run: python quote_annual_1trav_nonmedical.py
      - name: Capture quote - single 1 traveller, no medical
        continue-on-error: true
        run: python quote_single_1trav_nonmedical.py
      - name: Capture quote - single 2 travellers, medical
        continue-on-error: true
        run: python quote_single_2trav_medical.py
      - name: Capture quote - annual 2 travellers, medical
        continue-on-error: true
        run: python quote_annual_2trav_medical.py

      # --- Quote & Buy error / decision states ---
      - name: Capture quote error states
        continue-on-error: true
        run: python quote_errors.py

      # --- Renewals journey ---
      - name: Capture renewals journey
        continue-on-error: true
        env:
          RENEWAL_USERNAME: ${{ secrets.RENEWAL_USERNAME }}
          RENEWAL_PASSWORD: ${{ secrets.RENEWAL_PASSWORD }}
        run: python renewals_journey.py

      - name: Save screenshots back to the repo
        if: always()
        run: |
          git config user.name "screenshot-bot"
          git config user.email "screenshot-bot@users.noreply.github.com"
          git add screenshots
          git commit -m "Weekly screenshots $(date +%F)" || { echo "nothing new"; exit 0; }
          # Retry the push a few times in case another run pushed first.
          for attempt in 1 2 3 4 5; do
            if git pull --rebase origin main && git push origin main; then
              echo "pushed on attempt $attempt"
              break
            fi
            echo "push attempt $attempt failed - retrying in 5s..."
            sleep 5
          done
