name: Weekly journey screenshots

on:
  schedule:
    - cron: "0 6 * * 3"   # 06:00 UTC every Wednesday
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: screenshots
  cancel-in-progress: false

jobs:
  capture:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          python -m playwright install --with-deps chromium
      - name: Capture quote journey
        run: python quote_journey.py
      - name: Capture renewals journey
        env:
          RENEWAL_USERNAME: ${{ secrets.RENEWAL_USERNAME }}
          RENEWAL_PASSWORD: ${{ secrets.RENEWAL_PASSWORD }}
        run: python renewals_journey.py
      - name: Save screenshots back to the repo
        if: always()
        run: |
          git config user.name "screenshot-bot"
          git config user.email "screenshot-bot@users.noreply.github.com"
          git add screenshots
          git commit -m "Weekly screenshots $(date +%F)" || echo "nothing new"
          git pull --rebase origin main
          git push origin main
